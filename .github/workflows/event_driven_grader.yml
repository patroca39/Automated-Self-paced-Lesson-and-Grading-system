name: ⚡ Event-Driven Grader

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-grading]

jobs:
  run-grader:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install required Python packages
        run: |
          python -m pip install --upgrade pip
          pip install gspread pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib pydantic google-genai

      - name: Execute Assessment Grader
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python batch_grader.py --mode grade
