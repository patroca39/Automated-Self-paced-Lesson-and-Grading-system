name: Scheduled Batch AI Grader

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  batch-grading-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Stable Dependencies
        run: |
          pip install google-genai pydantic requests gspread oauth2client google-api-python-client pillow

      - name: Execute Batch Grader Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BASEROW_API_KEY: ${{ secrets.BASEROW_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python batch_grader.py
