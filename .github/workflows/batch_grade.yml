name: Automated Batch Grader

# This trigger allows you to run the workflow manually from the GitHub Actions tab,
# which is perfect for your current testing phase.
on:
  workflow_dispatch: 

jobs:
  run-grader:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install required Python packages
        run: |
          python -m pip install --upgrade pip
          pip install gspread pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib Pillow pydantic google-genai

      - name: Run the Batch Grader Factory
        env:
          # This pulls the secrets from your GitHub repository settings 
          # and injects them securely into the script's environment.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python batch_grader.py
