name: 🚀 Automated Deployer

on:
  workflow_dispatch: 
  schedule:
    # 8:40 AM UTC = 4:40 PM PHT
    # Gives the AI 20 minutes to generate everything before the 5:00 PM deadline
    - cron: '40 8 * * *'

jobs:
  run-deployer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install required Python packages
        run: |
          python -m pip install --upgrade pip
          pip install gspread pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib pydantic google-genai

      - name: Execute Assessment Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python batch_grader.py --mode deploy
